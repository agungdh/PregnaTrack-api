spring:
  application:
    name: PregnaTrack

  threads:
    virtual:
      enabled: true

  # SINKRONISASI DATABASE (Sesuai Compose)
  datasource:
    # Nama DB di compose adalah pregna_track (pake underscore)
    url: jdbc:postgresql://localhost:5432/pregna_track
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PregnaTrack-HikariPool
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  # SINKRONISASI VALKEY (Menggunakan konfigurasi Redis)
  data:
    redis:
      host: localhost
      port: 6379
      password: # Kosongkan karena di compose tidak di-set password-nya
      timeout: 6000ms

  # TAMBAHKAN KONFIGURASI MAILPIT (Untuk fitur kirim email/notifikasi bumil)
  mail:
    host: localhost
    port: 1025 # Port SMTP Mailpit dari compose
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false