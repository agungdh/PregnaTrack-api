name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: pregna_track
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      valkey:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              echo "Postgres is up"
              exit 0
            fi
            echo "Waiting for Postgres..."
            sleep 2
          done
          echo "Postgres did not start" >&2
          exit 1

      - name: Wait for Valkey
        run: |
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/6379) >/dev/null 2>&1; then
              echo "Valkey is up"
              exit 0
            fi
            echo "Waiting for Valkey..."
            sleep 2
          done
          echo "Valkey did not start" >&2
          exit 1

      - name: Run tests
        run: ./mvnw -B -ntp test
